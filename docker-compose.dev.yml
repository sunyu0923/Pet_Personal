services:
  db:
    image: docker.m.daocloud.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: peti
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: peti
    volumes:
      - peti_dev_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peti -d peti"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - peti_dev_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://peti:devpassword@db:5432/peti
      ALLOWED_ORIGINS: http://localhost,http://localhost:80
    depends_on:
      db:
        condition: service_healthy
    networks:
      - peti_dev_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dev_dist:/usr/share/nginx/html
    restart: "no"
    networks:
      - peti_dev_network

  nginx:
    image: docker.m.daocloud.io/library/nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dev_dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_completed_successfully
    networks:
      - peti_dev_network

volumes:
  peti_dev_pgdata:
  frontend_dev_dist:

networks:
  peti_dev_network:
    driver: bridge
