services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: peti
      POSTGRES_PASSWORD: peti_dev
      POSTGRES_DB: peti
    volumes:
      - peti_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peti -d peti"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://peti:peti_dev@db:5432/peti
      ALLOWED_ORIGINS: http://localhost
    depends_on:
      db:
        condition: service_healthy
    # 不对外暴露端口，只在内部网络通信

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      # 将构建产物挂载到 nginx 服务的 html 目录
      - frontend_dist:/usr/share/nginx/html

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend

volumes:
  peti_pgdata:
  frontend_dist:
